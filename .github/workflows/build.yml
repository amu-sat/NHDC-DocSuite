name: Build NHDC Document Suite

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Show Installed Packages
        shell: cmd
        run: |
          python --version
          pip list

      - name: Build Application
        shell: cmd
        run: |
          pyinstaller ^
            --clean ^
            --noconfirm ^
            --onedir ^
            --console ^
            --name "NHDC Document Suite" ^
            --collect-all PySide6 ^
            --hidden-import=fitz ^
            --hidden-import=PySide6.QtCore ^
            --hidden-import=PySide6.QtGui ^
            --hidden-import=PySide6.QtWidgets ^
            main.py

      - name: Show PyInstaller Warnings
        shell: powershell
        run: |
          $warn = "build\NHDC Document Suite\warn-NHDC Document Suite.txt"
          if (Test-Path $warn) {
            Write-Host "========== PYINSTALLER WARNINGS =========="
            Get-Content $warn
          } else {
            Write-Host "No warning file found."
          }

      - name: Show Dist Contents
        shell: powershell
        run: |
          Write-Host "========== DIST CONTENTS =========="
          Get-ChildItem -Recurse dist

      - name: Package Application
        shell: powershell
        run: |
          Compress-Archive `
            -Path "dist\NHDC Document Suite\*" `
            -DestinationPath "NHDC-Document-Suite.zip" `
            -Force

      - name: Upload Application
        uses: actions/upload-artifact@v4
        with:
          name: NHDC-Document-Suite
          path: NHDC-Document-Suite.zip

      - name: Upload PyInstaller Warning Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PyInstaller-Warnings
          path: build/NHDC Document Suite/warn-NHDC Document Suite.txt
          if-no-files-found: ignore
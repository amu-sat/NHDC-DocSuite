name: Build NHDC Document Suite

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller ^
            --clean ^
            --noconfirm ^
            --onefile ^
            --windowed ^
            --name "NHDC Document Suite" ^
            --collect-all PySide6 ^
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NHDC-Document-Suite
          path: dist/NHDC Document Suite/**